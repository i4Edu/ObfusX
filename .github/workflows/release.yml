name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (example: v0.6.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: openssl, json, zlib
          coverage: none
          ini-values: phar.readonly=0

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run test suite
        run: composer test

      - name: Resolve release tag and version
        id: version
        run: |
          SEMVER_PATTERN='^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(-[0-9A-Za-z]+)*(\.[0-9A-Za-z]+(-[0-9A-Za-z]+)*)*)?$'
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if ! printf '%s' "$TAG" | grep -Eq "$SEMVER_PATTERN"; then
            echo "Invalid release tag '${TAG}'. Use semantic version format like v0.6.0 or v0.6.0-beta.1." >&2
            exit 1
          fi
          if [ "${TAG#v}" = "${TAG}" ]; then
            TAG="v${TAG}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this release
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES="$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md | sed '/^[[:space:]]*$/d; /^---$/d')"
          {
            echo "notes<<EOF"
            printf '%s\n' "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: build-phar
        run: php build/phar.php

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ObfusX ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: obfusx.phar
          fail_on_unmatched_files: true

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/i4edu/obfusx:${{ steps.version.outputs.tag }}
            ghcr.io/i4edu/obfusx:latest
